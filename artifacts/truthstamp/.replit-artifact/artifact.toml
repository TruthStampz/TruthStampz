kind = "web"
previewPath = "/"
title = "TruthStamp"
version = "1.0.0"
id = "artifacts/truthstamp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19593
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/truthstamp run dev"

[services.env]
PORT = "19593"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/truthstamp", "run", "build"]
publicDir = "artifacts/truthstamp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
